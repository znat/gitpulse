name: PR title lint

# Conventional-commit linter on PR titles. Status check only — does not
# block merge. release-please reads PR titles to compute version bumps,
# so a non-conventional title would silently produce no bump. This
# surfaces it visibly.

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # Pinned to a commit SHA (Dependabot rotates it via .github/dependabot.yml).
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50  # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            test
            refactor
            perf
            ci
            build
            style
            revert
