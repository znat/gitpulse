name: Self-deploy

# Runs the gitpulse analyzer on this repo (znat/gitpulse) — dogfoods the
# local CLI workspace + site build on every push to main, without depending
# on the published @gitpulse/cli package. This is the bleeding-edge path;
# external consumers use publish-pages.yaml + the published CLI instead.

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitpulse-self-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Run analyzer (gitpulse analyze)
        run: yarn workspace @gitpulse/cli analyze
        env:
          AI_PROTOCOL: openai
          AI_BASE_URL: https://api.minimax.io/v1
          AI_MODEL: MiniMax-M2.7
          AI_TEMPERATURE: "0"
          GITPULSE_BOOTSTRAP_DAYS: "30"
          # Site reads from site/public/data/, so write directly there.
          GITPULSE_DATA_DIR: ${{ github.workspace }}/site/public/data
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build site
        run: yarn workspace @gitpulse/site build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
