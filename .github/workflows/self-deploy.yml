name: Self-deploy

# Dogfoods the published @gitpulse/cli + the public publish-pages.yaml
# reusable workflow exactly as external consumers experience them.
# Every push to main hits npx @gitpulse/cli@0 (analyze + build) →
# checkpoint that the consumer flow stays green.
#
# Local-workspace testing (against bleeding-edge code, not the published
# version) happens via `yarn workspace @gitpulse/cli analyze` during dev,
# and via the CI typecheck/test/build job in ci.yml on every PR.

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

# Reusable workflows can't elevate beyond the caller's GITHUB_TOKEN scope —
# pages: write + id-token: write must be granted here for publish-pages.yaml's
# inner deploy job to succeed.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    uses: znat/gitpulse/.github/workflows/publish-pages.yaml@main
    with:
      ai-protocol: openai
      ai-base-url: https://api.minimax.io/v1
      ai-model: MiniMax-M2.7
    secrets:
      OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
