name: Self-deploy

# Runs the gitpulse analyzer on this repo (znat/gitpulse) — dogfooding
# the same reusable workflow that consumers will install on their own repos.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/analyze.yml
    with:
      ai-model: MiniMax-M2.7
      ai-base-url: https://api.minimax.io/v1
      ai-temperature: 0.7
      bootstrap-days: 30
    secrets:
      OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
