name: Deploy to Vercel

# Mirrors what a consumer repo would do under "option 4": analyze + build
# run here in CI (using the published @gitpulse/cli@0); Vercel just hosts
# the pre-built static output. No Vercel-side build, no env vars to
# maintain on Vercel, no LLM keys leaving the CI runner.
#
# Runs alongside self-deploy.yml (Pages target). Both deploys are
# independent — gitpulse ships to both znat.github.io/gitpulse and the
# Vercel URL on every push to main.
#
# One-time setup (maintainer):
#   1. `vercel link` locally to create/connect the project — generates
#      .vercel/project.json with orgId + projectId.
#   2. Copy those IDs into repo secrets:
#        VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   3. Generate a Vercel token at https://vercel.com/account/tokens
#      and store as VERCEL_TOKEN repo secret.

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitpulse-vercel
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Resolve Vercel production URL
        id: vercel-url
        # Hit Vercel's project endpoint and pick the canonical production
        # alias. Custom domains (anything not ending in .vercel.app) are
        # preferred over the auto-assigned <project>.vercel.app, but the
        # latter is the fallback when no custom domain is attached yet.
        run: |
          set -euo pipefail
          INFO=$(curl -fsSL \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_ORG_ID")

          URL=$(echo "$INFO" | jq -r '
            ( [.alias[]? | select(.target == "PRODUCTION") | .domain]
              | sort_by(endswith(".vercel.app"))
              | .[0]
            ) // (.name + ".vercel.app")
          ')

          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "::error ::Could not resolve a Vercel production URL"
            echo "$INFO" | jq .
            exit 1
          fi

          echo "url=https://${URL}/" >> "$GITHUB_OUTPUT"
          echo "Resolved Vercel production URL: https://${URL}/"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Analyze (gitpulse analyze)
        run: npx -y @gitpulse/cli@0 analyze
        env:
          AI_PROTOCOL: openai
          AI_BASE_URL: https://api.minimax.io/v1
          AI_MODEL: MiniMax-M2.7
          # Pin to the Vercel URL so incremental state restore reads the
          # last published manifest from the right host on every run.
          GITPULSE_SITE_URL: ${{ steps.vercel-url.outputs.url }}
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build site (gitpulse build)
        run: npx -y @gitpulse/cli@0 build
        env:
          # Vercel serves at root, not /<repo>/.
          GITPULSE_BASE_PATH: none
          # Bake the canonical URL into the static HTML's <meta> tags.
          GITPULSE_SITE_URL: ${{ steps.vercel-url.outputs.url }}

      - name: Stage prebuilt output for Vercel
        # Vercel's --prebuilt flag expects this exact directory layout.
        # https://vercel.com/docs/build-output-api/v3
        run: |
          set -euo pipefail
          mkdir -p .vercel/output/static
          cp -RT .gitpulse/out .vercel/output/static
          cat > .vercel/output/config.json <<'EOF'
          { "version": 3 }
          EOF

      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest
          vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
