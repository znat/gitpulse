name: Deploy Protected Preview to Vercel (manual)

# On-demand counterpart to deploy-vercel-protected.yml. Triggered by
# Actions → Run workflow (workflow_dispatch) against any branch. Builds
# the in-repo site with GITPULSE_PASSWORD set and deploys to the
# protected Vercel project as a non-prod preview (no --prod flag, so
# the prod alias is untouched).
#
# Why manual: the auto-on-PR variant doubled file-upload volume per
# push and tripped Vercel's Hobby-plan 5000-file/24h cap. The signal
# you actually need — "did the encryption pipeline regress?" — is
# already covered by the prod workflow on main. Reach for this when
# you want to verify a feature branch's protected output before merge.
#
# Reuses VERCEL_PROTECTED_PROJECT_ID + GITPULSE_PASSWORD plus the
# existing VERCEL_TOKEN / VERCEL_ORG_ID / MINIMAX_API_KEY secrets.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitpulse-vercel-protected-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install + build in-repo CLI
        run: |
          yarn install --frozen-lockfile
          yarn workspace @gitpulse/cli build

      - name: Analyze (in-repo CLI)
        run: node cli/dist/cli.js analyze
        env:
          AI_PROTOCOL: openai
          AI_BASE_URL: https://api.minimax.io/v1
          AI_MODEL: MiniMax-M2.7
          # Restore state from the unprotected mirror — stories are a
          # function of git history, so fetching from either deployment
          # gives an identical manifest. Same source as the unprotected
          # preview workflow; sidesteps the chicken-and-egg of needing
          # a protected deploy to exist before this preview can run
          # incrementally.
          GITPULSE_SITE_URL: ${{ vars.VERCEL_SITE_URL }}
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage analyzer output for the in-repo site
        # We build the in-repo site directly (skipping `gitpulse
        # build`'s clone-of-published-site step) because the published
        # site at v<cli-version> predates encrypt.mjs — a clone build
        # would silently ship plaintext.
        run: |
          set -euo pipefail
          mkdir -p site/public/data
          cp -RT .gitpulse/data site/public/data

      - name: Build site (in-repo, encrypted)
        run: yarn workspace @gitpulse/site build
        env:
          GITPULSE_BASE_PATH: none
          GITPULSE_SITE_URL: https://gitpulse-demo-password-protected.vercel.app/
          GITPULSE_PASSWORD: ${{ secrets.GITPULSE_PASSWORD }}

      - name: Stage prebuilt output for Vercel
        run: |
          set -euo pipefail
          mkdir -p .vercel/output/static
          cp -RT site/out .vercel/output/static
          cat > .vercel/output/config.json <<'EOF'
          { "version": 3 }
          EOF

      - name: Deploy preview to Vercel (protected project)
        id: deploy
        run: |
          set -euo pipefail
          # Pinned major: avoids surprise breakage from a vercel@latest
          # release changing flags or stdout (URL capture relies on
          # stdout) — same as the unprotected preview workflow.
          npm install -g vercel@53
          URL=$(vercel deploy --prebuilt --yes)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROTECTED_PROJECT_ID }}

      - name: Write preview URL to run summary
        if: success()
        run: |
          {
            echo "### Vercel preview (protected mirror)"
            echo ""
            echo "Built from \`${{ github.sha }}\` on \`${{ github.ref_name }}\`."
            echo ""
            echo "${{ steps.deploy.outputs.url }}"
            echo ""
            echo "Use the configured \`GITPULSE_PASSWORD\` to unlock."
          } >> "$GITHUB_STEP_SUMMARY"
