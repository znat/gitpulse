name: Deploy Protected PR Preview to Vercel

# Mirror of deploy-vercel-preview.yml that exercises the password-
# protected build path on every PR. Same in-repo CLI build, but
# GITPULSE_PASSWORD is set so encrypt.mjs runs and the protected
# Vercel project receives the encrypted output. A separate sticky
# comment header keeps this preview's URL alongside the unprotected
# preview's instead of overwriting it.
#
# Reuses the same secrets as deploy-vercel-protected.yml
# (VERCEL_PROTECTED_PROJECT_ID + GITPULSE_PASSWORD), plus the existing
# VERCEL_TOKEN / VERCEL_ORG_ID / MINIMAX_API_KEY.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: gitpulse-vercel-protected-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install + build in-repo CLI
        run: |
          yarn install --frozen-lockfile
          yarn workspace @gitpulse/cli build

      - name: Analyze (in-repo CLI)
        run: node cli/dist/cli.js analyze
        env:
          AI_PROTOCOL: openai
          AI_BASE_URL: https://api.minimax.io/v1
          AI_MODEL: MiniMax-M2.7
          # Restore state from the unprotected mirror — stories are a
          # function of git history, so fetching from either deployment
          # gives an identical manifest. Same source as the unprotected
          # preview workflow; sidesteps the chicken-and-egg of needing
          # a protected deploy to exist before this preview can run
          # incrementally.
          GITPULSE_SITE_URL: ${{ vars.VERCEL_SITE_URL }}
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build site (in-repo CLI)
        run: node cli/dist/cli.js build
        env:
          GITPULSE_BASE_PATH: none
          GITPULSE_SITE_URL: https://gitpulse-demo-password-protected.vercel.app/
          GITPULSE_PASSWORD: ${{ secrets.GITPULSE_PASSWORD }}

      - name: Stage prebuilt output for Vercel
        run: |
          set -euo pipefail
          mkdir -p .vercel/output/static
          cp -RT .gitpulse/out .vercel/output/static
          cat > .vercel/output/config.json <<'EOF'
          { "version": 3 }
          EOF

      - name: Deploy preview to Vercel (protected project)
        id: deploy
        run: |
          set -euo pipefail
          # Pinned major: avoids surprise breakage from a vercel@latest
          # release changing flags or stdout (URL capture relies on
          # stdout) — same as the unprotected preview workflow.
          npm install -g vercel@53
          URL=$(vercel deploy --prebuilt --yes)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROTECTED_PROJECT_ID }}

      - name: Comment protected-preview URL on PR (sticky)
        if: success()
        # Distinct header from `vercel-preview` so this comment lives
        # alongside the unprotected preview's instead of overwriting it.
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405  # v2.9.4
        with:
          header: vercel-preview-protected
          message: |
            **Vercel preview (protected mirror)** — built from `${{ github.event.pull_request.head.sha }}`

            ${{ steps.deploy.outputs.url }}

            Use the configured `GITPULSE_PASSWORD` to unlock.

      - name: Comment deploy failure on PR (sticky)
        if: failure()
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405  # v2.9.4
        with:
          header: vercel-preview-protected
          message: |
            **Vercel preview (protected mirror) failed** for `${{ github.event.pull_request.head.sha }}`

            See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
