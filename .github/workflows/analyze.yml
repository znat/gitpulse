name: Gitpulse Analyze

on:
  workflow_call:
    inputs:
      bootstrap-days:
        description: "On first run, how far back to look for PRs/commits."
        type: number
        default: 30
      ai-model:
        description: "Model id used for story generation. Must be supported by the chosen ai-base-url provider."
        type: string
        default: gpt-4o-mini
      ai-base-url:
        description: "Base URL for the chat-completions endpoint. Leave empty for OpenAI. For OpenAI-compatible providers (MiniMax, Groq, OpenRouter, Together, etc.) set this to their API base, e.g. https://api.minimax.io/v1."
        type: string
        default: ""
      ai-protocol:
        description: "API protocol the model speaks. 'openai' for OpenAI/Groq/OpenRouter/etc. 'anthropic' for Claude or for MiniMax via its Anthropic-compatible endpoint."
        type: string
        default: openai
      ai-temperature:
        description: "Sampling temperature for the LLM."
        type: number
        default: 0
      size-thresholds:
        description: |
          Optional JSON overriding the size buckets used for the rule-based size pill.
          Default: {"xs":{"maxLines":10,"maxFiles":1},"small":{"maxLines":100,"maxFiles":5},"medium":{"maxLines":500,"maxFiles":15},"large":{"maxLines":1000,"maxFiles":30}}
          Anything above large.maxLines is xl. Provide a partial object to override a subset.
        type: string
        default: ""
    secrets:
      OPENAI_API_KEY:
        required: false
        # Holds the API key for whichever OpenAI-compatible provider is configured via ai-base-url.

permissions:
  contents: read

concurrency:
  group: gitpulse-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history — analyzer needs git log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run analyzer
        run: yarn workspace @gitpulse/action analyze
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: ${{ inputs.ai-model }}
          AI_PROTOCOL: ${{ inputs.ai-protocol }}
          AI_BASE_URL: ${{ inputs.ai-base-url }}
          AI_TEMPERATURE: ${{ inputs.ai-temperature }}
          GITPULSE_BOOTSTRAP_DAYS: ${{ inputs.bootstrap-days }}
          GITPULSE_SIZE_THRESHOLDS: ${{ inputs.size-thresholds }}

      - name: Build site
        run: yarn workspace @gitpulse/site build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
