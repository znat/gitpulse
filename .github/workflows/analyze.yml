name: Gitpulse Analyze

on:
  workflow_call:
    inputs:
      bootstrap-days:
        description: "On first run, how far back to look for PRs/commits."
        type: number
        default: 30
      anthropic-model:
        description: "Anthropic model id used for story generation."
        type: string
        default: claude-sonnet-4-6
    secrets:
      ANTHROPIC_API_KEY:
        required: false # Phase 0 has no AI calls; required from Phase 2 onward.

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gitpulse-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build site
        run: yarn workspace @gitpulse/site build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
