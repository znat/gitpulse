name: Gitpulse Analyze

on:
  workflow_call:
    inputs:
      bootstrap-days:
        description: "On first run, how far back to look for PRs/commits."
        type: number
        default: 30
      ai-model:
        description: "Model id used for story generation. Must be supported by the chosen ai-base-url provider."
        type: string
        default: gpt-4o-mini
      ai-base-url:
        description: "Base URL for the chat-completions endpoint. Leave empty for OpenAI. For OpenAI-compatible providers (MiniMax, Groq, OpenRouter, Together, etc.) set this to their API base, e.g. https://api.minimax.io/v1."
        type: string
        default: ""
      ai-temperature:
        description: "Sampling temperature for the LLM."
        type: number
        default: 0.7
    secrets:
      OPENAI_API_KEY:
        required: false # Phase 0 has no AI calls; required from Phase 2 onward.
                        # Holds the API key for whichever OpenAI-compatible provider is configured via ai-base-url.

permissions:
  contents: read

concurrency:
  group: gitpulse-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history — analyzer needs git log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run analyzer
        run: yarn workspace @gitpulse/action analyze
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: ${{ inputs.ai-model }}
          AI_BASE_URL: ${{ inputs.ai-base-url }}
          AI_TEMPERATURE: ${{ inputs.ai-temperature }}
          GITPULSE_BOOTSTRAP_DAYS: ${{ inputs.bootstrap-days }}

      - name: Build site
        run: yarn workspace @gitpulse/site build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitpulse-site
          path: site/out
          retention-days: 7

  # Pages deployment is gated until the repo is public (Pages is not
  # available on private repos for free / Pro / Team plans). Once the
  # repo flips public, uncomment the deploy job below and remove the
  # generic upload-artifact step above.
