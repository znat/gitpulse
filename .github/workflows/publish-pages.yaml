name: Gitpulse Publish (Pages)

# Reusable workflow for repos that want gitpulse's editorial story feed
# published to GitHub Pages. Wraps `gitpulse analyze` + `gitpulse build`
# from the @gitpulse/cli npm package and ships the result to Pages.
#
# Consumer usage (pre-1.0 — pin @v0; we'll cut @v1 when the API stabilises):
#   permissions:
#     contents: read
#     pages: write
#     id-token: write
#   jobs:
#     publish:
#       uses: znat/gitpulse/.github/workflows/publish-pages.yaml@v0
#       secrets: inherit
#
# Reusable workflows can't elevate beyond the caller's GITHUB_TOKEN
# permissions, so the calling workflow MUST grant pages:write and
# id-token:write or the deploy job will fail with permission-denied.
#
# For non-Pages targets (Vercel, Netlify, Cloudflare Pages), call the CLI
# directly inside your build hook — see the gitpulse README for recipes.

on:
  workflow_call:
    # Text model and analysis scope (provider/model, bootstrapDays, concurrency,
    # releasesCap, includePrereleases…) are configured in `.gitpulse.json` at the
    # consumer repo root — not as workflow inputs. Only deploy-environment-specific
    # values (base-path, site-url) and secrets are passed here.
    inputs:
      base-path:
        description: 'basePath override for static export. "auto" (default) = /<repo> derived from GITHUB_REPOSITORY (project Pages — the common case). "none" = root deployment (user/org Pages, custom domain). Or a literal prefix like "/blog".'
        type: string
        default: "auto"
      site-url:
        description: "Absolute public URL of the deployed site (e.g. https://my.example.com). Used for canonical/SEO links and analyzer state restore. Required when base-path is not 'auto'."
        type: string
        default: ""
    secrets:
      OPENAI_API_KEY:
        required: false
        # Required when .gitpulse.json `text.provider` is "openai" or
        # "openai-compatible" (MiniMax, OpenRouter, etc.).
      ANTHROPIC_API_KEY:
        required: false
        # Required when .gitpulse.json `text.provider` is "anthropic". Pass via
        # `secrets: inherit` or map explicitly under `secrets:` in the caller.

permissions:
  contents: read

concurrency:
  group: gitpulse-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Validate base-path / site-url consistency
        # When base-path is overridden away from 'auto', the GH-Pages-derived
        # canonical URL is wrong, so site-url must be supplied explicitly.
        if: ${{ inputs.base-path != 'auto' && inputs.site-url == '' }}
        run: |
          echo "::error ::base-path is '${{ inputs.base-path }}' but site-url is empty. Set site-url to your deployed URL (e.g. https://my.app) so canonical links and incremental state restore work correctly."
          exit 1

      # Pinned to commit SHAs — Dependabot rotates via .github/dependabot.yml.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22

      - name: Analyze (gitpulse analyze)
        run: npm install -g @gitpulse/cli@0 --silent && gitpulse analyze
        # Text model + analysis scope come from .gitpulse.json. Only the
        # deploy URL (env override) and secrets are supplied here.
        env:
          GITPULSE_SITE_URL: ${{ inputs.site-url }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build site (gitpulse build)
        run: gitpulse build
        env:
          # Sentinels resolved in site/next.config.js:
          #   "auto" (default) → basePath /<repo>/ from GITHUB_REPOSITORY
          #   "none"           → root deployment (user/org Pages, custom domain)
          #   "/literal/path"  → custom prefix (e.g. /blog)
          GITPULSE_BASE_PATH: ${{ inputs.base-path }}
          GITPULSE_SITE_URL: ${{ inputs.site-url }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./.gitpulse/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
