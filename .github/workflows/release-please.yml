name: release-please

# Maintains an open "release: vX.Y.Z" PR that aggregates conventional
# commits since the last tag. Merging that PR creates the immutable
# tag, the GitHub Release, and (via the second job) moves the
# major-version pointer (v1, v2, …) so consumers pinning `@v1` get
# non-breaking upgrades automatically.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  # release-please writes labels (autorelease: pending / autorelease: tagged)
  # via the issues API, so this scope is required even though we don't use
  # GitHub Issues directly.
  issues: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # Top-level outputs reflect only the root (".") package in manifest mode.
      # Per-package outputs are namespaced as "<path>--<name>" — we read the
      # cli ones via outputs[] in dependent jobs.
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      major: ${{ steps.rp.outputs.major }}
      cli_release_created: ${{ steps.rp.outputs['cli--release_created'] }}
      cli_tag_name: ${{ steps.rp.outputs['cli--tag_name'] }}
      cli_major: ${{ steps.rp.outputs['cli--major'] }}
    steps:
      # Pinned to a commit SHA (Dependabot rotates it via .github/dependabot.yml).
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        id: rp
        with:
          # Note: using the default GITHUB_TOKEN means the release PR's merge
          # commit and the created GitHub Release will NOT trigger downstream
          # workflows that listen on `push: main` or `release: published`.
          # Trade-off accepted for setup simplicity. To restore downstream
          # triggering, swap this for a fine-grained PAT secret with
          # `contents: write` + `pull-requests: write`.
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  move-major-tag:
    # The v<major> floating tag tracks the cli package — that's what
    # external consumers pin via `uses: znat/gitpulse/.github/workflows/
    # publish-pages.yaml@v0` (the workflow file is gated to the cli's
    # release lifecycle).
    needs: release-please
    if: ${{ needs.release-please.outputs.cli_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Pinned to commit SHAs — release path; Dependabot rotates via .github/dependabot.yml.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Move v<major> tag to the new release
        run: |
          MAJOR="v${{ needs.release-please.outputs.cli_major }}"
          TAG="${{ needs.release-please.outputs.cli_tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$TAG"
          git push origin "$MAJOR" --force

  publish-cli:
    # Publishes @gitpulse/cli to npm via Trusted Publishing (OIDC).
    # No NPM_TOKEN secret — short-lived credential is minted at publish time
    # from the runner's OIDC token. The trust relationship is configured once
    # on npmjs.com under @gitpulse/cli → Settings → Publishing access:
    #   Provider:   GitHub Actions
    #   Owner:      znat
    #   Repo:       gitpulse
    #   Workflow:   release-please.yml
    needs: release-please
    if: ${{ needs.release-please.outputs.cli_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for both Trusted Publishing and provenance
    steps:
      # Pinned to commit SHAs — release path; Dependabot rotates via .github/dependabot.yml.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.cli_tag_name }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org
      # Trusted Publishing requires npm ≥ 11.5.1; Node 22 ships with npm 10.x.
      # Pinned for reproducibility; bump deliberately when adopting new features.
      - run: npm install -g npm@11.9.0
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @gitpulse/cli build
      - working-directory: cli
        run: npm publish --access public --provenance
