name: release-please

# Maintains an open "release: vX.Y.Z" PR that aggregates conventional
# commits since the last tag. Merging that PR creates the immutable
# tag, the GitHub Release, and (via the second job) moves the
# major-version pointer (v1, v2, …) so consumers pinning `@v1` get
# non-breaking upgrades automatically.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  # release-please writes labels (autorelease: pending / autorelease: tagged)
  # via the issues API, so this scope is required even though we don't use
  # GitHub Issues directly.
  issues: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      major: ${{ steps.rp.outputs.major }}
    steps:
      # Pinned to a commit SHA (Dependabot rotates it via .github/dependabot.yml).
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071  # v4
        id: rp
        with:
          # Note: using the default GITHUB_TOKEN means the release PR's merge
          # commit and the created GitHub Release will NOT trigger downstream
          # workflows that listen on `push: main` or `release: published`.
          # Trade-off accepted for setup simplicity. To restore downstream
          # triggering, swap this for a fine-grained PAT secret with
          # `contents: write` + `pull-requests: write`.
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  move-major-tag:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Move v<major> tag to the new release
        run: |
          MAJOR="v${{ needs.release-please.outputs.major }}"
          TAG="${{ needs.release-please.outputs.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$TAG"
          git push origin "$MAJOR" --force
