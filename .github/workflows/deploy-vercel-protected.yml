name: Deploy Protected Mirror to Vercel

# Mirror of deploy-vercel.yml that exercises the password-protected
# build path end-to-end. Same source, same analyze pipeline, but
# GITPULSE_PASSWORD is set so encrypt.mjs runs at build time and the
# Vercel project at gitpulse-demo-password-protected.vercel.app serves
# the encrypted output.
#
# Builds the *in-repo* cli + site (not the published @gitpulse/cli@0
# and the @v<cli-version> site clone): the published site predates
# this branch's encrypt.mjs, so a published-cli build would silently
# ship plaintext. Using in-repo source pins the protected mirror to
# whatever encryption pipeline is on this branch — exactly what we
# want for regression detection.
#
# One-time setup:
#   1. Create a separate Vercel project pointing at the same repo with
#      "Import Git Repository" skipped (CI handles deploys).
#   2. Add these repo SECRETS (Settings → Secrets and variables →
#      Actions → New repository secret):
#        VERCEL_PROTECTED_PROJECT_ID — Project → Settings → General →
#                                      Project ID for the protected
#                                      mirror project
#        GITPULSE_PASSWORD          — chosen unlock password
#      Reuses the existing VERCEL_TOKEN, VERCEL_ORG_ID, and
#      MINIMAX_API_KEY secrets from deploy-vercel.yml.

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitpulse-vercel-protected
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install + build in-repo CLI
        run: |
          yarn install --frozen-lockfile
          yarn workspace @gitpulse/cli build

      - name: Analyze (in-repo CLI)
        run: node cli/dist/cli.js analyze
        env:
          AI_PROTOCOL: openai
          AI_BASE_URL: https://api.minimax.io/v1
          AI_MODEL: MiniMax-M2.7
          # Restore state from the unprotected mirror — stories are a
          # function of git history, identical between deployments, so
          # the manifest fetched here is correct for this build too.
          # Avoids a chicken-and-egg on first deploy + a coupling to
          # the published cli's decrypt support.
          GITPULSE_SITE_URL: ${{ vars.VERCEL_SITE_URL }}
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage analyzer output for the in-repo site
        # gitpulse build's clone-and-build flow injects this path; we
        # do it inline since we're skipping the clone.
        run: |
          set -euo pipefail
          mkdir -p site/public/data
          cp -RT .gitpulse/data site/public/data

      - name: Build site (in-repo, encrypted)
        run: yarn workspace @gitpulse/site build
        env:
          GITPULSE_BASE_PATH: none
          # Canonical URL for the protected mirror's <meta> tags.
          GITPULSE_SITE_URL: https://gitpulse-demo-password-protected.vercel.app/
          # Triggers encrypt.mjs at the end of `next build`.
          GITPULSE_PASSWORD: ${{ secrets.GITPULSE_PASSWORD }}

      - name: Stage prebuilt output for Vercel
        run: |
          set -euo pipefail
          mkdir -p .vercel/output/static
          cp -RT site/out .vercel/output/static
          cat > .vercel/output/config.json <<'EOF'
          { "version": 3 }
          EOF

      - name: Deploy to Vercel (protected project)
        run: |
          npm install -g vercel@latest
          vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROTECTED_PROJECT_ID }}
